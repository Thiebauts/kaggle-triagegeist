name: triagegeist
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pytorch=2.1.2
  - pytorch-cuda=11.8
  - pip:
      - numpy>=1.24.0,<2.0.0
      - pandas>=2.0.0
      - scikit-learn>=1.3.0
      - scipy>=1.11.0
      - lightgbm>=4.0.0
      - xgboost>=2.0.0
      - catboost>=1.2.0
      - shap>=0.43.0
      - transformers>=4.35.0,<4.40.0
      - sentence-transformers>=2.2.0,<3.0.0
      - accelerate>=0.25.0
      - azureml-core
      - azureml-mlflow
      - mlflow
      - matplotlib>=3.8.0
      - seaborn>=0.13.0
      - tqdm
